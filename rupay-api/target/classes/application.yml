server:
  port: 8080

spring:
  application:
    name: rupay-api
  
  datasource:
    url: jdbc:h2:mem:rupaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# JWT Configuration
jwt:
  secret: RuPayExchangeSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
  expiration: 86400000 # 24 hours in milliseconds

# CORS Configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001

logging:
  level:
    com.rupay: DEBUG
    org.springframework.security: DEBUG
